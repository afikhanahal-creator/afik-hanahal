<svg viewBox="0 0 460 440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- A: left leg -->
  <line x1="182" y1="46" x2="52"  y2="308" stroke="white" stroke-width="11" stroke-linecap="butt"/>
  <!-- A: right leg -->
  <line x1="182" y1="46" x2="312" y2="308" stroke="white" stroke-width="11" stroke-linecap="butt"/>
  <!-- H: left vertical (overlaps A's inner-right area) -->
  <line x1="272" y1="46" x2="272" y2="308" stroke="white" stroke-width="11" stroke-linecap="butt"/>
  <!-- H: right vertical -->
  <line x1="404" y1="46" x2="404" y2="308" stroke="white" stroke-width="11" stroke-linecap="butt"/>
  <!-- Shared crossbar: A + H unified -->
  <line x1="118" y1="191" x2="404" y2="191" stroke="white" stroke-width="11" stroke-linecap="butt"/>

  <!-- AFIK HANACHAL -->
  <text x="228" y="358"
        fill="white"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="20"
        font-weight="300"
        letter-spacing="8"
        text-anchor="middle">AFIK HANACHAL</text>

  <!-- REAL ESTATE -->
  <text x="228" y="390"
        fill="white"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="14"
        font-weight="500"
        letter-spacing="5"
        text-anchor="middle">REAL ESTATE</text>
</svg>
